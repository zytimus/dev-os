# Netlify config for the ContractIQ Next.js app.
# The git repo root is `dev-os`, but the app lives in the `contractiq/` subfolder,
# so we tell Netlify to build from there.
[build]
  base = "contractiq"
  command = "npm run build"
  # Relative to `base` above -> contractiq/.next
  publish = ".next"

[build.environment]
  # These keys are NOT secrets but get inlined into the build output, tripping
  # Netlify's secrets scanner:
  #   - OPENAI_MODEL / APP_URL: a model name and a public URL.
  #   - NEXT_PUBLIC_* : Next.js inlines these into the client bundle by design.
  #     Supabase anon key + URL are public by design (protected by RLS, not secrecy).
  # Real secrets (OPENAI_API_KEY, SUPABASE_SERVICE_ROLE_KEY) stay scanned.
  SECRETS_SCAN_OMIT_KEYS = "OPENAI_MODEL,APP_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_SUPABASE_URL"

# Enables SSR, API routes, and middleware on Netlify.
# Netlify auto-detects Next.js and installs this, but declaring it is explicit and safe.
[[plugins]]
  package = "@netlify/plugin-nextjs"
